:root {
  --cream: #fdf6ec;
  --warm-white: #fffdf9;
  --ink: #1a1410;
  --ink-light: #5c4a38;
  --accent: #c0622b;
  --accent-soft: #e8916a;
  --accent-pale: #f5ddd0;
  --border: #d9c9b8;
  --shadow: rgba(60, 30, 10, 0.10);
  --success: #3a7d44;
  --error: #b93a2b;
}

body {
  background-color: var(--cream);
  background-image:
    radial-gradient(ellipse at 20% 10%, #f5e6d3 0%, transparent 50%),
    radial-gradient(ellipse at 80% 90%, #f0e2d4 0%, transparent 50%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Noto Serif TC', serif;
  color: var(--ink);
  padding: 2rem 1rem;
}

.card {
  background: var(--warm-white);
  border: 1.5px solid var(--border);
  border-radius: 2px;
  box-shadow: 0 4px 32px var(--shadow), 0 1px 4px var(--shadow);
  width: 100%;
  max-width: 560px;
  padding: 0;
  overflow: hidden;
  animation: slideIn 0.5s cubic-bezier(.22,.68,0,1.2) both;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(24px) scale(0.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.card-header {
  background: var(--ink);
  padding: 2rem 2.5rem 1.8rem;
  position: relative;
  overflow: hidden;
}

.card-header::before {
  content: '🐾';
  position: absolute;
  right: 2rem;
  top: 50%;
  transform: translateY(-50%);
  font-size: 4rem;
  opacity: 0.12;
  pointer-events: none;
}

.card-header h1 {
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--cream);
  letter-spacing: 0.04em;
  line-height: 1.3;
}

.card-header p {
  margin-top: 0.4rem;
  font-size: 0.78rem;
  color: #a08870;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.06em;
}

.accent-bar {
  height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--accent-soft), transparent);
}

.card-body {
  padding: 2rem 2.5rem 2.5rem;
}

.field-group {
  margin-bottom: 1.4rem;
}

label {
  display: block;
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-light);
  margin-bottom: 0.5rem;
  font-family: 'JetBrains Mono', monospace;
}

label span.required {
  color: var(--accent);
  margin-left: 2px;
}

input, select, textarea {
  width: 100%;
  background: var(--cream);
  border: 1.5px solid var(--border);
  border-radius: 2px;
  padding: 0.65rem 0.9rem;
  font-family: 'Noto Serif TC', serif;
  font-size: 0.95rem;
  color: var(--ink);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  appearance: none;
  -webkit-appearance: none;
}

input:focus, select:focus, textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-pale);
  background: var(--warm-white);
}

input::placeholder, textarea::placeholder {
  color: #c4b09a;
  font-size: 0.88rem;
}

textarea {
  resize: vertical;
  min-height: 80px;
}

.row-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
}

.divider {
  border: none;
  border-top: 1px dashed var(--border);
  margin: 1.8rem 0;
}

.btn-submit {
  width: 100%;
  padding: 0.85rem 1.5rem;
  background: var(--ink);
  color: var(--cream);
  border: none;
  border-radius: 2px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.88rem;
  font-weight: 600;
  letter-spacing: 0.12em;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: background 0.2s, transform 0.12s;
}

.btn-submit:hover {
  background: #2e1f0f;
}

.btn-submit:active {
  transform: scale(0.985);
}

.btn-submit:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.btn-submit .btn-text { transition: opacity 0.2s; }
.btn-submit.loading .btn-text { opacity: 0; }

.spinner {
  display: none;
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 18px; height: 18px;
  border: 2px solid rgba(253,246,236,0.3);
  border-top-color: var(--cream);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

.btn-submit.loading .spinner { display: block; }

@keyframes spin {
  to { transform: translate(-50%, -50%) rotate(360deg); }
}

.status-bar {
  margin-top: 1rem;
  padding: 0.7rem 1rem;
  border-radius: 2px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem;
  letter-spacing: 0.04em;
  display: none;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-4px); }
  to   { opacity: 1; transform: translateY(0); }
}

.status-bar.success {
  display: block;
  background: #eaf4eb;
  border: 1.5px solid #86c98e;
  color: var(--success);
}

.status-bar.error {
  display: block;
  background: #fdf0ee;
  border: 1.5px solid #e8a59e;
  color: var(--error);
}

.card-footer {
  padding: 1rem 2.5rem;
  border-top: 1px solid var(--border);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem;
  color: #b09a88;
  letter-spacing: 0.04em;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent-soft);
  display: inline-block;
}

@media (max-width: 480px) {
  .card-header, .card-body { padding-left: 1.5rem; padding-right: 1.5rem; }
  .row-2 { grid-template-columns: 1fr; }
  .card-footer { padding-left: 1.5rem; padding-right: 1.5rem; }
}

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  // ── 連線設定 ────────────────────────────────────────────────
  const SUPABASE_URL = 'https://vmgwyvwkhqnjmbdbliia.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_G_iir9jUBnqBkIfhaGCyMg_fd449ELVng';

  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // ── 送出函式 ────────────────────────────────────────────────
  async function submitRecord() {
    const btn    = document.getElementById('submitBtn');
    const status = document.getElementById('statusBar');

    const cat_name = document.getElementById('cat_name').value.trim();
    const type     = document.getElementById('type').value.trim();
    const value    = document.getElementById('value').value.trim();
    const kcal     = document.getElementById('kcal').value;
    const note     = document.getElementById('note').value.trim();

    // 基本驗證
    if (!cat_name || !type) {
      showStatus('error', '⚠ 請至少填寫「貓咪名稱」和「類型」');
      return;
    }

    // 組裝資料（只送有值的欄位）
    const record = { cat_name, type };
    if (value)             record.value = value;
    if (kcal !== '')       record.kcal  = parseFloat(kcal);
    if (note)              record.note  = note;

    // 載入中狀態
    btn.disabled = true;
    btn.classList.add('loading');
    status.className = 'status-bar';
    status.style.display = 'none';

    try {
      const { data, error } = await db
        .from('health_records')
        .insert([record])
        .select();

      if (error) throw error;

      showStatus('success', '✓ 存檔成功！資料已寫入 health_records。');
      alert('存檔成功！');
      clearForm();

    } catch (err) {
      const msg = err?.message || '未知錯誤';
      showStatus('error', '✕ 失敗：' + msg);
      alert('失敗：' + msg);
    } finally {
      btn.disabled = false;
      btn.classList.remove('loading');
    }
  }

  function showStatus(type, msg) {
    const el = document.getElementById('statusBar');
    el.textContent = msg;
    el.className = 'status-bar ' + type;
  }

  function clearForm() {
    ['cat_name','type','value','kcal','note'].forEach(id => {
      document.getElementById(id).value = '';
    });
  }

  // Enter 鍵送出（textarea 除外）
  document.querySelectorAll('input').forEach(el => {
    el.addEventListener('keydown', e => {
      if (e.key === 'Enter') submitRecord();
    });
  });
</script>
