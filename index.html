<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="貓咪日記" />
  <title>🐱 布偶貓健康日記</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet" />

  <style>
    :root {
      --cream: #fdf6ee;
      --warm-white: #fffaf4;
      --blush: #f4c6c6;
      --dusty-rose: #e8a4a4;
      --mauve: #c97c7c;
      --lavender: #d4c5e8;
      --periwinkle: #b8aad4;
      --sage: #b5cbb4;
      --caramel: #d4a574;
      --chocolate: #8b5e3c;
      --ink: #2c1f1f;
      --muted: #8c7b7b;
      --card-bg: rgba(255, 250, 244, 0.88);
      --shadow-soft: 0 4px 24px rgba(139, 94, 60, 0.10);
      --shadow-card: 0 8px 32px rgba(139, 94, 60, 0.12);
      --radius: 20px;
      --radius-sm: 12px;
      --safe-top: env(safe-area-inset-top, 44px);
      --safe-bottom: env(safe-area-inset-bottom, 20px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      touch-action: manipulation;
      overflow: hidden; /* prevent body scroll */
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--cream);
      color: var(--ink);
      background-image:
        radial-gradient(ellipse at 20% 0%, rgba(244,198,198,0.38) 0%, transparent 52%),
        radial-gradient(ellipse at 85% 8%, rgba(212,197,232,0.30) 0%, transparent 48%),
        radial-gradient(ellipse at 50% 100%, rgba(181,203,180,0.22) 0%, transparent 48%);
      background-attachment: fixed;
    }

    /* ─── App shell: full screen, flex column ─── */
    #app {
      width: 100%;
      max-width: 430px;
      height: 100dvh; /* dynamic viewport height — survives Safari toolbar */
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ─── Header: fixed at top, does NOT scroll ─── */
    .app-header {
      flex-shrink: 0;
      padding-top: var(--safe-top);
      padding-left: 20px;
      padding-right: 20px;
      background: rgba(253,246,238,0.96);
      backdrop-filter: blur(16px);
      z-index: 10;
    }
    .header-inner {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 0 10px;
      border-bottom: 1.5px solid rgba(201,124,124,0.15);
    }
    .header-cat {
      display: flex; align-items: center; gap: 10px;
    }
    .cat-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: linear-gradient(135deg, var(--blush), var(--lavender));
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      box-shadow: 0 2px 10px rgba(201,124,124,0.25);
      flex-shrink: 0;
    }
    .cat-name {
      font-family: 'Playfair Display', serif;
      font-size: 20px; font-weight: 700;
      color: var(--chocolate);
    }
    .cat-subtitle {
      font-size: 11px; color: var(--muted); font-weight: 600;
      letter-spacing: 0.5px;
      display: flex; align-items: center; gap: 4px;
    }
    .header-date { text-align: right; }
    .header-date .date-main { font-size: 13px; font-weight: 800; color: var(--mauve); }
    .header-date .date-time { font-size: 11px; color: var(--muted); }

    /* ─── Content area: grows to fill remaining space, scrollable ─── */
    .content-area {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      /* hide scrollbar visually but keep function */
      scrollbar-width: none;
    }
    .content-area::-webkit-scrollbar { display: none; }

    /* ─── Pages ─── */
    .page { display: none; padding: 16px 16px 20px; animation: fadeUp 0.28s ease; }
    .page.active { display: block; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── Section title ─── */
    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 22px; font-weight: 700; color: var(--chocolate);
      margin-bottom: 4px;
    }
    .section-sub {
      font-size: 12px; color: var(--muted); font-weight: 600;
      margin-bottom: 16px; letter-spacing: 0.3px;
    }

    /* ─── Cards ─── */
    .card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow-card);
      border: 1.5px solid rgba(255,255,255,0.72);
      margin-bottom: 14px;
    }
    .card-title {
      font-size: 13px; font-weight: 800; color: var(--mauve);
      text-transform: uppercase; letter-spacing: 0.8px;
      margin-bottom: 14px;
      display: flex; align-items: center; gap: 6px;
    }

    /* ─── Summary cards ─── */
    .summary-row {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
      margin-bottom: 14px;
    }
    .summary-card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border-radius: var(--radius-sm);
      padding: 14px;
      box-shadow: var(--shadow-soft);
      border: 1.5px solid rgba(255,255,255,0.72);
      text-align: center;
    }
    .summary-card .s-icon { font-size: 24px; margin-bottom: 4px; }
    .summary-card .s-value { font-size: 20px; font-weight: 900; color: var(--chocolate); line-height: 1; }
    .summary-card .s-unit { font-size: 10px; color: var(--muted); font-weight: 700; }
    .summary-card .s-label { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* ─── Inputs ─── */
    .input-group { margin-bottom: 12px; }
    .input-label {
      font-size: 12px; font-weight: 800; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.5px;
      margin-bottom: 6px; display: flex; align-items: center; gap: 5px;
    }
    .input-row { display: flex; gap: 8px; align-items: center; }

    input[type="number"],
    input[type="text"],
    input[type="time"],
    select,
    textarea {
      width: 100%;
      background: rgba(255,255,255,0.62);
      border: 2px solid rgba(201,124,124,0.2);
      border-radius: var(--radius-sm);
      padding: 11px 14px;
      font-family: 'Nunito', sans-serif;
      font-size: 15px; font-weight: 700;
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      -webkit-appearance: none;
      appearance: none;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--dusty-rose);
      background: rgba(255,255,255,0.92);
    }
    .input-unit { font-size: 12px; font-weight: 800; color: var(--muted); white-space: nowrap; min-width: 28px; }

    /* ─── Tag chips ─── */
    .tag-grid { display: flex; flex-wrap: wrap; gap: 7px; }
    .tag-chip {
      padding: 7px 13px;
      border-radius: 50px;
      font-size: 13px; font-weight: 700;
      border: 2px solid rgba(201,124,124,0.22);
      background: rgba(255,255,255,0.5);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s ease;
      user-select: none;
    }
    .tag-chip.selected {
      background: linear-gradient(135deg, var(--blush), var(--lavender));
      border-color: transparent;
      color: var(--chocolate);
      box-shadow: 0 2px 8px rgba(201,124,124,0.25);
      transform: scale(1.04);
    }
    .tag-chip:active { transform: scale(0.95); }

    /* ─── Poop grid ─── */
    .poop-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .poop-btn {
      padding: 10px 8px;
      border-radius: var(--radius-sm);
      font-size: 13px; font-weight: 700;
      border: 2px solid rgba(201,124,124,0.2);
      background: rgba(255,255,255,0.5);
      color: var(--muted);
      cursor: pointer;
      text-align: center;
      transition: all 0.15s ease;
      display: flex; align-items: center; justify-content: center; gap: 5px;
    }
    .poop-btn.selected {
      background: linear-gradient(135deg, #f0e6d3, #e8d4c0);
      border-color: var(--caramel);
      color: var(--chocolate);
      box-shadow: 0 2px 8px rgba(212,165,116,0.3);
    }
    .poop-btn:active { transform: scale(0.95); }

    /* ─── Save button ─── */
    .btn-save {
      width: 100%;
      padding: 0;
      border-radius: 18px;
      background: linear-gradient(135deg, #e8a4a4 0%, #c97c7c 50%, #b8aad4 100%);
      color: white;
      font-family: 'Nunito', sans-serif;
      border: none;
      cursor: pointer;
      box-shadow:
        0 6px 28px rgba(201,124,124,0.45),
        0 2px 8px rgba(184,170,212,0.3),
        inset 0 1px 0 rgba(255,255,255,0.25);
      transition: all 0.22s ease;
      position: relative;
      overflow: hidden;
      margin-top: 6px;
    }
    .btn-save::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, transparent 60%);
      border-radius: inherit;
      pointer-events: none;
    }
    .btn-save-inner {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      padding: 17px 24px;
      position: relative; z-index: 1;
    }
    .btn-save-icon { font-size: 20px; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.15)); }
    .btn-save-text { font-size: 17px; font-weight: 900; letter-spacing: 0.6px; text-shadow: 0 1px 3px rgba(0,0,0,0.12); }
    .btn-save-sub { font-size: 11px; font-weight: 700; opacity: 0.8; letter-spacing: 0.4px; }
    .btn-save:active { transform: scale(0.97); box-shadow: 0 3px 14px rgba(201,124,124,0.35); }
    .btn-save.loading { opacity: 0.75; }

    /* ─── Toast ─── */
    .toast {
      position: fixed;
      bottom: calc(80px + var(--safe-bottom));
      left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--chocolate);
      color: white;
      padding: 12px 22px;
      border-radius: 50px;
      font-size: 14px; font-weight: 700;
      box-shadow: 0 4px 20px rgba(44,31,31,0.3);
      opacity: 0; transition: all 0.3s ease;
      pointer-events: none; z-index: 999;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ─── Navigation: fixed at bottom, does NOT scroll ─── */
    .nav-bar {
      flex-shrink: 0;
      background: rgba(253,246,238,0.94);
      backdrop-filter: blur(20px) saturate(1.5);
      border-top: 1.5px solid rgba(255,255,255,0.75);
      box-shadow: 0 -2px 20px rgba(139,94,60,0.08);
      display: flex;
      padding: 8px 12px;
      /* ✅ Safe area: avoids iPhone home indicator */
      padding-bottom: calc(8px + env(safe-area-inset-bottom));
      gap: 4px;
      z-index: 10;
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      padding: 8px 4px;
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
      background: transparent;
      font-family: 'Nunito', sans-serif;
    }
    .nav-item .nav-icon { font-size: 22px; line-height: 1; transition: transform 0.2s ease; }
    .nav-item .nav-label { font-size: 11px; font-weight: 800; color: var(--muted); letter-spacing: 0.3px; transition: color 0.2s; }
    .nav-item.active { background: linear-gradient(135deg, rgba(244,198,198,0.55), rgba(212,197,232,0.45)); }
    .nav-item.active .nav-label { color: var(--chocolate); }
    .nav-item.active .nav-icon { transform: scale(1.15); }
    .nav-item:active { transform: scale(0.93); }

    /* ─── History ─── */
    .history-item {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      margin-bottom: 10px;
      border: 1.5px solid rgba(255,255,255,0.72);
      box-shadow: var(--shadow-soft);
    }
    .history-date { font-size: 12px; font-weight: 800; color: var(--mauve); margin-bottom: 8px; letter-spacing: 0.3px; }
    .history-stats { display: flex; flex-wrap: wrap; gap: 6px; }
    .stat-pill {
      background: rgba(244,198,198,0.4);
      border-radius: 50px;
      padding: 4px 10px;
      font-size: 12px; font-weight: 700;
      color: var(--chocolate);
    }

    /* ─── Connection dot ─── */
    .conn-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #ccc; display: inline-block;
      transition: background 0.3s; flex-shrink: 0;
    }
    .conn-dot.ok { background: #7bc87b; }
    .conn-dot.err { background: #e87b7b; }

    /* ─── Misc ─── */
    textarea { resize: none; height: 72px; line-height: 1.5; }
    .divider { height: 1.5px; background: linear-gradient(90deg, transparent, rgba(201,124,124,0.18), transparent); margin: 14px 0; }
    .empty-state { text-align: center; padding: 48px 20px; color: var(--muted); }
    .empty-state .empty-icon { font-size: 52px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; font-weight: 600; }

    .today-banner {
      background: linear-gradient(135deg, rgba(244,198,198,0.5), rgba(212,197,232,0.4));
      border-radius: var(--radius);
      padding: 16px 18px;
      margin-bottom: 14px;
      border: 1.5px solid rgba(255,255,255,0.72);
    }
    .banner-title {
      font-family: 'Playfair Display', serif;
      font-size: 16px; color: var(--chocolate); margin-bottom: 10px; font-style: italic;
    }

    .loader {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4); border-top-color: white;
      border-radius: 50%; animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="app">

  <!-- ① Header — fixed top, flex-shrink: 0 -->
  <header class="app-header">
    <div class="header-inner">
      <div class="header-cat">
        <div class="cat-avatar">🐱</div>
        <div>
          <div class="cat-name">布偶貓日記</div>
          <div class="cat-subtitle">
            <span class="conn-dot" id="connDot"></span>
            <span id="connText">連線中...</span>
          </div>
        </div>
      </div>
      <div class="header-date">
        <div class="date-main" id="headerDate">—</div>
        <div class="date-time" id="headerTime">—</div>
      </div>
    </div>
  </header>

  <!-- ② Content area — flex: 1, only this scrolls -->
  <div class="content-area" id="contentArea">

    <!-- ══ TODAY ══ -->
    <div class="page active" id="page-today">
      <div class="section-title">今日狀況 ☀️</div>
      <div class="section-sub">台灣時間 · 每日 23:59 自動結算</div>
      <div id="todaySummary"></div>
      <div id="lastEntryCard"></div>
    </div>

    <!-- ══ RECORD ══ -->
    <div class="page" id="page-record">
      <div class="section-title">新增紀錄 🐾</div>
      <div class="section-sub">記錄每一次餵食與排泄</div>

      <!-- 🥣 Feeding -->
      <div class="card">
        <div class="card-title">🥣 餵食</div>
        <div class="input-group">
          <div class="input-label">⏰ 餵食時間</div>
          <input type="time" id="feedTime" />
        </div>
        <div class="input-group">
          <div class="input-label">🍖 食物種類</div>
          <select id="foodType">
            <option value="乾飼料">🌾 乾飼料</option>
            <option value="主食罐">🥫 主食罐</option>
            <option value="副食罐">🍱 副食罐</option>
            <option value="生食">🥩 生食</option>
            <option value="點心">🍬 點心</option>
          </select>
        </div>
        <div class="input-group">
          <div class="input-label">⚖️ 克數</div>
          <div class="input-row">
            <input type="number" id="feedGrams" placeholder="0" min="0" max="500" />
            <span class="input-unit">g</span>
          </div>
        </div>
        <div class="input-group">
          <div class="input-label">🔥 熱量</div>
          <div class="input-row">
            <input type="number" id="feedCalories" placeholder="自動計算 or 手動輸入" min="0" />
            <span class="input-unit">kcal</span>
          </div>
        </div>
      </div>

      <!-- 💧 Water -->
      <div class="card">
        <div class="card-title">💧 飲水</div>
        <div class="input-group">
          <div class="input-label">飲水量</div>
          <div class="input-row">
            <input type="number" id="waterMl" placeholder="0" min="0" max="1000" />
            <span class="input-unit">ml</span>
          </div>
        </div>
      </div>

      <!-- 🚽 Litter -->
      <div class="card">
        <div class="card-title">🚽 廁所</div>
        <div class="input-group">
          <div class="input-label">🟡 小便（可複選）</div>
          <div class="tag-grid" id="peeTagGrid">
            <div class="tag-chip" data-val="正常">😊 正常</div>
            <div class="tag-chip" data-val="量多">💦 量多</div>
            <div class="tag-chip" data-val="量少">💧 量少</div>
            <div class="tag-chip" data-val="顏色異常">🟠 顏色異常</div>
            <div class="tag-chip" data-val="血尿">🔴 血尿</div>
            <div class="tag-chip" data-val="頻繁">🔁 頻繁</div>
            <div class="tag-chip" data-val="未排尿">❌ 未排尿</div>
          </div>
        </div>
        <div class="divider"></div>
        <div class="input-group">
          <div class="input-label">💩 大便狀態</div>
          <div class="poop-grid" id="poopGrid">
            <button class="poop-btn" data-val="正常">💩 正常</button>
            <button class="poop-btn" data-val="偏軟">🤏 偏軟</button>
            <button class="poop-btn" data-val="水便">💦 水便</button>
            <button class="poop-btn" data-val="偏硬">🪨 偏硬</button>
            <button class="poop-btn" data-val="未排便">❌ 未排便</button>
            <button class="poop-btn" data-val="有血絲">🔴 有血絲</button>
          </div>
        </div>
      </div>

      <!-- 📝 Memo -->
      <div class="card">
        <div class="card-title">📝 備忘</div>
        <div class="input-group">
          <textarea id="memo" placeholder="今天有什麼特別的事嗎？比如活力、毛髮、眼睛狀況..."></textarea>
        </div>
      </div>

      <!-- ✨ Save button — no stray dividers below -->
      <button class="btn-save" id="saveBtn" onclick="saveRecord()">
        <div class="btn-save-inner">
          <span class="btn-save-icon" id="saveBtnIcon">✨</span>
          <div>
            <div class="btn-save-text" id="saveBtnText">儲存紀錄</div>
            <div class="btn-save-sub">記錄毛孩的每一天</div>
          </div>
        </div>
      </button>
    </div>

    <!-- ══ HISTORY ══ -->
    <div class="page" id="page-history">
      <div class="section-title">歷史紀錄 📅</div>
      <div class="section-sub">過去 30 天的健康軌跡</div>
      <div id="historyList">
        <div class="empty-state">
          <div class="empty-icon">🐱</div>
          <p>載入中...</p>
        </div>
      </div>
    </div>

  </div><!-- end .content-area -->

  <!-- ③ Nav bar — fixed bottom, flex-shrink: 0, with safe-area padding -->
  <nav class="nav-bar">
    <button class="nav-item active" id="nav-today" onclick="switchPage('today')">
      <span class="nav-icon">☀️</span>
      <span class="nav-label">今日</span>
    </button>
    <button class="nav-item" id="nav-record" onclick="switchPage('record')">
      <span class="nav-icon">🐾</span>
      <span class="nav-label">紀錄</span>
    </button>
    <button class="nav-item" id="nav-history" onclick="switchPage('history')">
      <span class="nav-icon">📅</span>
      <span class="nav-label">歷史</span>
    </button>
  </nav>

</div><!-- end #app -->

<div class="toast" id="toast"></div>

<script>

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// ══════════════════════════════════════════
//  TAIWAN TIME
// ══════════════════════════════════════════
function getTWNow() {
  return new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Taipei' }));
}
function formatTWDate(d) {
  const y = d.getFullYear(), m = d.getMonth()+1, day = d.getDate();
  const wdays = ['日','一','二','三','四','五','六'];
  return `${y}年${m}月${day}日 (${wdays[d.getDay()]})`;
}
function formatTWTime(d) {
  return d.toLocaleTimeString('zh-TW', { hour:'2-digit', minute:'2-digit', hour12:true, timeZone:'Asia/Taipei' });
}
function getTWDateOnly(d = getTWNow()) {
  return d.toLocaleDateString('sv-SE', { timeZone:'Asia/Taipei' });
}

// ══════════════════════════════════════════
//  CLOCK
// ══════════════════════════════════════════
function updateClock() {
  const now = getTWNow();
  document.getElementById('headerDate').textContent = formatTWDate(now);
  document.getElementById('headerTime').textContent = formatTWTime(now);
}
updateClock();
setInterval(updateClock, 1000);

// Default feed time
(function() {
  const now = getTWNow();
  document.getElementById('feedTime').value =
    String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
})();

// ══════════════════════════════════════════
//  CONNECTION TEST
// ══════════════════════════════════════════
async function testConnection() {
  try {
    const { error } = await db.from('cat_records').select('id').limit(1);
    if (error) throw error;
    document.getElementById('connDot').className = 'conn-dot ok';
    document.getElementById('connText').textContent = '已連線';
  } catch {
    document.getElementById('connDot').className = 'conn-dot err';
    document.getElementById('connText').textContent = '連線失敗';
  }
}
testConnection();

// ══════════════════════════════════════════
//  NAVIGATION — scroll content area to top on switch
// ══════════════════════════════════════════
function switchPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  document.getElementById('contentArea').scrollTo({ top: 0, behavior: 'smooth' });
  if (name === 'today') loadToday();
  if (name === 'history') loadHistory();
}

// ══════════════════════════════════════════
//  TAG CHIPS & POOP BUTTONS
// ══════════════════════════════════════════
let selectedPeeTags = [];
let selectedPoop = '';

document.querySelectorAll('#peeTagGrid .tag-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    const val = chip.dataset.val;
    if (selectedPeeTags.includes(val)) {
      selectedPeeTags = selectedPeeTags.filter(v => v !== val);
      chip.classList.remove('selected');
    } else {
      selectedPeeTags.push(val);
      chip.classList.add('selected');
    }
  });
});

document.querySelectorAll('#poopGrid .poop-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#poopGrid .poop-btn').forEach(b => b.classList.remove('selected'));
    selectedPoop = btn.dataset.val;
    btn.classList.add('selected');
  });
});

// ══════════════════════════════════════════
//  SAVE
// ══════════════════════════════════════════
async function saveRecord() {
  const btn = document.getElementById('saveBtn');
  const btnIcon = document.getElementById('saveBtnIcon');
  const btnText = document.getElementById('saveBtnText');

  const now = getTWNow();
  const record = {
    record_date: getTWDateOnly(now),
    record_time: document.getElementById('feedTime').value || null,
    food_type: document.getElementById('foodType').value,
    feed_grams: parseFloat(document.getElementById('feedGrams').value) || null,
    calories_kcal: parseFloat(document.getElementById('feedCalories').value) || null,
    water_ml: parseFloat(document.getElementById('waterMl').value) || null,
    pee_tags: selectedPeeTags.length > 0 ? selectedPeeTags : null,
    poop_state: selectedPoop || null,
    memo: document.getElementById('memo').value.trim() || null,
    created_at_tw: now.toISOString(),
  };

  if (!record.feed_grams && !record.water_ml && selectedPeeTags.length === 0 && !selectedPoop) {
    showToast('⚠️ 請至少填寫一項資料');
    return;
  }

  btn.classList.add('loading');
  btnIcon.innerHTML = '<span class="loader"></span>';
  btnText.textContent = '儲存中...';

  try {
    const { error } = await db.from('cat_records').insert([record]).select();
    if (error) throw error;
    showToast('✅ 紀錄已儲存！');
    resetForm();
    setTimeout(() => switchPage('today'), 800);
  } catch (e) {
    showToast('❌ 儲存失敗：' + (e.message || '請確認資料表'));
  } finally {
    btn.classList.remove('loading');
    btnIcon.textContent = '✨';
    btnText.textContent = '儲存紀錄';
  }
}

function resetForm() {
  ['feedGrams','feedCalories','waterMl','memo'].forEach(id => document.getElementById(id).value = '');
  selectedPeeTags = []; selectedPoop = '';
  document.querySelectorAll('#peeTagGrid .tag-chip').forEach(c => c.classList.remove('selected'));
  document.querySelectorAll('#poopGrid .poop-btn').forEach(b => b.classList.remove('selected'));
  const now = getTWNow();
  document.getElementById('feedTime').value =
    String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
}

// ══════════════════════════════════════════
//  TODAY
// ══════════════════════════════════════════
async function loadToday() {
  try {
    const { data, error } = await db
      .from('cat_records').select('*')
      .eq('record_date', getTWDateOnly())
      .order('record_time', { ascending: true });
    if (error) throw error;

    const summaryEl = document.getElementById('todaySummary');
    const lastEl = document.getElementById('lastEntryCard');

    if (!data || data.length === 0) {
      summaryEl.innerHTML = `
        <div class="today-banner">
          <div class="banner-title">今天還沒有紀錄 🌙</div>
          <div style="font-size:13px;color:var(--muted);font-weight:600;">快去新增第一筆吧！</div>
        </div>`;
      lastEl.innerHTML = '';
      return;
    }

    const totalG = data.reduce((s,r)=>s+(r.feed_grams||0),0);
    const totalC = data.reduce((s,r)=>s+(r.calories_kcal||0),0);
    const totalW = data.reduce((s,r)=>s+(r.water_ml||0),0);

    summaryEl.innerHTML = `
      <div class="summary-row">
        <div class="summary-card"><div class="s-icon">🥣</div><div class="s-value">${totalG.toFixed(0)}</div><div class="s-unit">克</div><div class="s-label">今日總餵食</div></div>
        <div class="summary-card"><div class="s-icon">🔥</div><div class="s-value">${totalC.toFixed(0)}</div><div class="s-unit">kcal</div><div class="s-label">總熱量</div></div>
        <div class="summary-card"><div class="s-icon">💧</div><div class="s-value">${totalW.toFixed(0)}</div><div class="s-unit">ml</div><div class="s-label">飲水量</div></div>
        <div class="summary-card"><div class="s-icon">📋</div><div class="s-value">${data.length}</div><div class="s-unit">筆</div><div class="s-label">紀錄筆數</div></div>
      </div>`;

    const recent = [...data].reverse().slice(0,3);
    lastEl.innerHTML = `
      <div class="card">
        <div class="card-title">📋 今日紀錄</div>
        ${recent.map(r => `
          <div style="padding:8px 0;border-bottom:1px solid rgba(201,124,124,0.1);">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
              <span style="font-size:13px;font-weight:800;color:var(--chocolate);">${r.record_time||'--'} · ${r.food_type||''}</span>
              ${r.feed_grams?`<span style="font-size:12px;color:var(--muted);font-weight:700;">${r.feed_grams}g</span>`:''}
            </div>
            <div style="display:flex;flex-wrap:wrap;gap:4px;">
              ${r.water_ml?`<span class="stat-pill">💧 ${r.water_ml}ml</span>`:''}
              ${r.poop_state?`<span class="stat-pill">💩 ${r.poop_state}</span>`:''}
              ${(r.pee_tags&&r.pee_tags.length)?r.pee_tags.map(t=>`<span class="stat-pill">🟡 ${t}</span>`).join(''):''}
              ${r.memo?`<span class="stat-pill">📝 備忘</span>`:''}
            </div>
          </div>`).join('')}
      </div>`;
  } catch (e) {
    document.getElementById('todaySummary').innerHTML = `
      <div class="today-banner"><div class="banner-title">⚠️ 無法載入</div><div style="font-size:12px;color:var(--muted);">${e.message}</div></div>`;
  }
}

// ══════════════════════════════════════════
//  HISTORY
// ══════════════════════════════════════════
async function loadHistory() {
  const el = document.getElementById('historyList');
  el.innerHTML = '<div class="empty-state"><div class="empty-icon">🐱</div><p>載入中...</p></div>';
  try {
    const { data, error } = await db
      .from('cat_records').select('*')
      .order('record_date', { ascending:false })
      .order('record_time', { ascending:false })
      .limit(200);
    if (error) throw error;
    if (!data || !data.length) {
      el.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>還沒有任何紀錄</p></div>';
      return;
    }
    const grouped = {};
    data.forEach(r => { if (!grouped[r.record_date]) grouped[r.record_date]=[]; grouped[r.record_date].push(r); });
    el.innerHTML = Object.keys(grouped).map(date => {
      const recs = grouped[date];
      const tG = recs.reduce((s,r)=>s+(r.feed_grams||0),0);
      const tW = recs.reduce((s,r)=>s+(r.water_ml||0),0);
      const tC = recs.reduce((s,r)=>s+(r.calories_kcal||0),0);
      const poops = [...new Set(recs.map(r=>r.poop_state).filter(Boolean))];
      const pees  = [...new Set(recs.flatMap(r=>r.pee_tags||[]))];
      return `
        <div class="history-item">
          <div class="history-date">📅 ${fmtHistDate(date)} · ${recs.length} 筆</div>
          <div class="history-stats">
            ${tG?`<span class="stat-pill">🥣 ${tG.toFixed(0)}g</span>`:''}
            ${tC?`<span class="stat-pill">🔥 ${tC.toFixed(0)}kcal</span>`:''}
            ${tW?`<span class="stat-pill">💧 ${tW.toFixed(0)}ml</span>`:''}
            ${poops.map(p=>`<span class="stat-pill">💩 ${p}</span>`).join('')}
            ${pees.slice(0,3).map(p=>`<span class="stat-pill">🟡 ${p}</span>`).join('')}
          </div>
        </div>`;
    }).join('');
  } catch (e) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><p>${e.message}</p></div>`;
  }
}

function fmtHistDate(str) {
  const [y,m,d] = str.split('-');
  const wdays = ['日','一','二','三','四','五','六'];
  return `${+m}月${+d}日 (${wdays[new Date(+y,+m-1,+d).getDay()]})`;
}

// ══════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}

// Init
loadToday();
</script>
